<!DOCTYPE html>
<html lang="pt-pt">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, 
initial-scale=1.0">
	<title>Pseudo-classes</title>
	<style>
	div {
        display: inline-block;
        background-color: grey;
        border: 1px solid black;
        text-align: center;
		width: 150px;
		height: 150px;
	}

    div:hover {
        background-color: gold;
    }

    div:active {
        background-color: red;
    }

    .clique:active {
         background-color: red;
    }

    #c1:hover {
        background-color: rgb(189, 49, 189);
    }

    #c2:hover {
        background-color: green;
    }

    #c1:active {
        background-color: red;
    }

    #c2:active {
        background-color: red;
    }
	</style>
</head>
<body>
	<div id="c1">A</div>
	<div class="clique">B</div>
	<div class="clique">C</div>
    <div id="c2">D</div>
</body>
