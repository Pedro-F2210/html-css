<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes Externas</title>
    <style>
        @font-face {
            font-family: 'Love';
            src: url('fonts/Love.otf') format('-opentype');
            font-weight: normal;
            font-style: normal;
            /*
            Tipos de format()
            -opentype()
            -truetype()
            -embed-opentype
            -truetype-aat (Apple Advanced Typograph)
            -svg
            */
        }
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        h1 {
            font-family: 'Love', Times, serif;
            font-size: 3em;
            font-weight: normal;
        }
    </style>
</head>
<body>
    <h1>Olá Mundo!</h1>
    <p>Lorem, ipsum dolor sit amet consectetur adipisicing elit. Nisi, dignissimos facere cupiditate, voluptatem, tenetur voluptatum dolor eaque cumque cum recusandae obcaecati consequatur. Atque dolorum id quam provident eius nesciunt ea.</p>
</body>
</html>
